# Google Cloud Build configuration for Cloud Run deployment

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sarina-voice-backend:latest'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/sarina-voice-backend:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sarina-voice-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sarina-voice-backend:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '3600'
      - '--set-env-vars'
      - 'NODE_ENV=production,HEARTBEAT_INTERVAL_SECONDS=10,MINIMUM_CALL_BALANCE_SECONDS=10,GEMINI_MODEL=gemini-2.0-flash,GEMINI_VOICE=Aoede'
      - '--set-secrets'
      - 'GEMINI_API_KEY=gemini-api-key:latest,FIREBASE_PROJECT_ID=firebase-project-id:latest,FIREBASE_PRIVATE_KEY=firebase-private-key:latest,FIREBASE_CLIENT_EMAIL=firebase-client-email:latest'

images:
  - 'gcr.io/$PROJECT_ID/sarina-voice-backend:latest'

timeout: '1200s' # 20 minutes
