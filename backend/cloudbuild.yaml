# Google Cloud Build configuration for Cloud Run deployment
# Deploy with: gcloud builds submit --config cloudbuild.yaml --substitutions=_GEMINI_API_KEY=<your-key> .

substitutions:
  _GEMINI_API_KEY: ''  # Pass via --substitutions flag, never commit the real value

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sarina-voice-backend:latest'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/sarina-voice-backend:latest'

  # Deploy to Cloud Run — GEMINI_API_KEY as env var, Firebase creds via Secret Manager
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        # Remove GEMINI_API_KEY secret ref first (can't mix --remove-secrets with --set-secrets)
        gcloud run services update sarina-voice-backend \
          --region us-central1 \
          --remove-secrets=GEMINI_API_KEY || true

        # Deploy new image with GEMINI_API_KEY as plain env var
        gcloud run deploy sarina-voice-backend \
          --image gcr.io/$PROJECT_ID/sarina-voice-backend:latest \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --memory 512Mi \
          --cpu 1 \
          --min-instances 0 \
          --max-instances 10 \
          --timeout 3600 \
          --set-env-vars "NODE_ENV=production,HEARTBEAT_INTERVAL_SECONDS=10,MINIMUM_CALL_BALANCE_SECONDS=10,GEMINI_MODEL=gemini-2.0-flash,GEMINI_VOICE=Aoede,GEMINI_API_KEY=${_GEMINI_API_KEY}" \
          --set-secrets "FIREBASE_PROJECT_ID=firebase-project-id:latest,FIREBASE_PRIVATE_KEY=firebase-private-key:latest,FIREBASE_CLIENT_EMAIL=firebase-client-email:latest"

images:
  - 'gcr.io/$PROJECT_ID/sarina-voice-backend:latest'

timeout: '1200s'
